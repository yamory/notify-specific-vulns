name: yamory vulnerability notify

on:
  schedule:
    - cron: "0 * * * *" # 毎時0分 (UTC)
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed mode: 通知せず現時点の該当IDを台帳に記録するだけ（初回に実行推奨）"
        type: boolean
        default: false

# 台帳コミットの競合を防ぐため同時実行しない
concurrency:
  group: vuln-notify
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run vulnerability check
        env:
          YAMORY_API_TOKEN: ${{ secrets.YAMORY_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SEED_MODE: ${{ inputs.seed == true && 'true' || 'false' }}
        run: python notify_vulns.py

      # 実行ログ (state/last-run.log) は毎回変わるため、毎時必ずコミットされる。
      # これによりリポジトリの活動が維持され、GitHub による schedule の
      # 自動停止（60日無活動）を防ぐ。
      - name: Commit notified state and run log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 台帳はJSONのためgitの行マージでは衝突しやすい。
          # push競合時は origin 側と自分の台帳をユニオンマージして再試行する。
          cp state/notified.json /tmp/local-state.json
          cp state/last-run.log /tmp/local-run.log
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            python3 - <<'EOF'
          import json

          with open("/tmp/local-state.json", encoding="utf-8") as f:
              local = json.load(f)
          with open("state/notified.json", encoding="utf-8") as f:
              remote = json.load(f)
          remote.setdefault("vulnIds", {}).update(local.get("vulnIds", {}))
          with open("state/notified.json", "w", encoding="utf-8") as f:
              json.dump(remote, f, ensure_ascii=False, indent=2, sort_keys=True)
              f.write("\n")
          EOF
            cp /tmp/local-run.log state/last-run.log
            git add state/notified.json state/last-run.log
            if git diff --cached --quiet; then
              echo "Nothing to commit."
              exit 0
            fi
            git commit -m "chore: record run log [skip ci]"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}). Retrying with merged state..."
          done
          echo "Failed to push state after 3 attempts." >&2
          exit 1
